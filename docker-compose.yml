services:
  bot:
    build: .
    env_file: .env
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - ./generated_images:/app/generated_images
      - ./src:/app/src

  mongodb:
    image: mirror.gcr.io/library/mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongodb_data:
